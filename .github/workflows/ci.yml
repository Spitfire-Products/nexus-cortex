name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Lint (fails on error-level issues; warnings are a tidy-up backlog)
        run: npm run lint
      - run: npm run build
      - name: Doc counts up to date (build auto-refreshes them; fail if the commit was stale)
        run: |
          if ! git diff --quiet -- README.md; then
            echo "::error::README registry counts are stale. Run 'npm run docs:counts' and commit."
            git --no-pager diff -- README.md
            exit 1
          fi
          echo "[OK] README counts match the registries"
      - name: Tests (fresh-clone mode, no API keys)
        run: |
          for p in core executors server cli tui; do
            [ -d packages/$p ] || { echo "skip $p (not in this release)"; continue; }
            (cd packages/$p && npx vitest run --passWithNoTests)
          done

  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: React Doctor score gate (TUI)
        run: |
          # tui is a Release-2 package — absent in the engine-only (R1) repo.
          [ -d packages/tui ] || { echo "packages/tui not present — skipping react-doctor gate"; exit 0; }
          cd packages/tui
          # Pin the version so tool updates don't silently move the gate. Floor is a
          # no-regression ratchet at the current measured baseline (raise it as the
          # remaining real findings in the Ink UI are fixed — most current ones are
          # false positives: render-scoped key counters, intentional prop-sync).
          FLOOR=14
          SCORE=$(npx --yes react-doctor@0.5.1 --score | tail -1 | tr -dc '0-9')
          echo "react-doctor score: $SCORE (floor: $FLOOR)"
          [ "$SCORE" -ge "$FLOOR" ] || { echo "Score regressed below floor $FLOOR"; exit 1; }
