name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Tests (fresh-clone mode, no API keys)
        run: |
          for p in core executors server cli tui; do
            (cd packages/$p && npx vitest run --passWithNoTests)
          done

  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: React Doctor score gate (TUI)
        working-directory: packages/tui
        run: |
          SCORE=$(npx --yes react-doctor@latest --score | tail -1 | tr -dc '0-9')
          echo "react-doctor score: $SCORE (floor: 40)"
          [ "$SCORE" -ge 40 ] || { echo "Score regressed below floor"; exit 1; }
