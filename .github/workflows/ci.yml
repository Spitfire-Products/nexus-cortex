name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    # executors depends on the full `playwright` package, whose install downloads browser
    # binaries — that OOM-crashed `npm ci` ("Exit handler never called!") and the install
    # never linked bins (the misleading "eslint: not found" downstream). CI runs no browser
    # tests, so skip the download.
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
      # Pin the EXACT node (not "20") so its bundled npm is 10.8.2. The runner's newer npm
      # intermittently aborts `npm ci` with "Exit handler never called!", leaving bins
      # unlinked — `tsc`/`eslint` then fall through to the runner's GLOBAL tools (global tsc
      # is 6.x → TS5107 on our locked config; eslint absent → "not found"). A bare
      # `npm install -g npm@…` step does NOT change the npm the next step runs, so we pin
      # node instead.
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
      # `npm ci` reify intermittently aborts on this runner with "Exit handler never
      # called!" — and crucially it then exits 0, leaving an INCOMPLETE install (bins not
      # linked). So we gate fallbacks on whether tsc actually linked, NOT on exit code, and
      # lead with --ignore-scripts (skips the playwright/native postinstall that triggers
      # the crash). The build is `tsc` only — type-check needs the bins + shipped .d.ts, not
      # postinstall artifacts — so this yields a complete toolchain. If bins never link, the
      # build would silently fall through to the runner's global tsc 6.x (TS5107); the final
      # assert fails the job loudly instead.
      # `npm ci` reify aborts on this runner with "Exit handler never called!" then exits 0,
      # leaving an INCOMPLETE install (bins unlinked → build falls through to global tsc 6.x
      # → TS5107). Same npm 10.8.2 installs cleanly locally, so it's the runner's reify
      # concurrency race; the documented fix is to serialize with --maxsockets 1. We gate
      # fallbacks on whether tsc linked (NOT exit code), lead with --ignore-scripts (build is
      # tsc-only), and dump the npm debug log if all attempts fail.
      - name: Install deps (serialized, result-checked, self-healing)
        run: |
          node -v && npm -v
          linked() { test -x node_modules/.bin/tsc; }
          clean() { rm -rf node_modules packages/*/node_modules 2>/dev/null || true; }
          echo "::group::attempt 1 — npm ci --ignore-scripts --maxsockets 1"; npm ci --no-audit --no-fund --ignore-scripts --maxsockets 1 || true; echo "::endgroup::"
          if ! linked; then echo "::group::attempt 2 — npm install --ignore-scripts --maxsockets 1"; clean; npm install --no-audit --no-fund --no-save --ignore-scripts --maxsockets 1 || true; echo "::endgroup::"; fi
          if ! linked; then
            echo "::group::npm debug log"; tail -n 60 /home/runner/.npm/_logs/*-debug-0.log 2>/dev/null || echo "(no debug log)"; echo "::endgroup::"
            echo "::error::tsc not linked after install — would fall through to global tsc"; exit 1
          fi
          echo "[ok] local tsc $(node_modules/.bin/tsc --version)"
      - name: Lint (fails on error-level issues; warnings are a tidy-up backlog)
        run: npm run lint
      - run: npm run build
      - name: Doc counts up to date (build auto-refreshes them; fail if the commit was stale)
        run: |
          if ! git diff --quiet -- README.md; then
            echo "::error::README registry counts are stale. Run 'npm run docs:counts' and commit."
            git --no-pager diff -- README.md
            exit 1
          fi
          echo "[OK] README counts match the registries"
      - name: Tests (fresh-clone mode, no API keys)
        run: |
          for p in core executors server cli tui; do
            [ -d packages/$p ] || { echo "skip $p (not in this release)"; continue; }
            (cd packages/$p && npx vitest run --passWithNoTests)
          done

  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: React Doctor score gate (TUI)
        run: |
          # tui is a Release-2 package — absent in the engine-only (R1) repo.
          [ -d packages/tui ] || { echo "packages/tui not present — skipping react-doctor gate"; exit 0; }
          cd packages/tui
          # Pin the version so tool updates don't silently move the gate. Floor is a
          # no-regression ratchet at the current measured baseline (raise it as the
          # remaining real findings in the Ink UI are fixed — most current ones are
          # false positives: render-scoped key counters, intentional prop-sync).
          FLOOR=14
          SCORE=$(npx --yes react-doctor@0.5.1 --score | tail -1 | tr -dc '0-9')
          echo "react-doctor score: $SCORE (floor: $FLOOR)"
          [ "$SCORE" -ge "$FLOOR" ] || { echo "Score regressed below floor $FLOOR"; exit 1; }
