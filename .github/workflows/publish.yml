name: Publish to npm

# Fires when the deploy script pushes a version tag (deploy-nexus-cortex.sh --release),
# or manually via the Actions tab. Publishes the engine packages to npm in dependency
# order. Idempotent: versions already on the registry are skipped, so re-runs and
# partial-failure recovery are safe. The TUI (@nexus-cortex/tui) is Release 2 — never
# published here.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — pack and validate, but do not publish'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # executors -> playwright downloads browsers on install and OOM-crashes npm ci.
      # No browser tests here, so skip it.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
      # Pin EXACT node so its bundled npm is 10.8.2 — the runner's newer npm intermittently
      # aborts `npm ci` ("Exit handler never called!"), unlinking bins so the build falls
      # through to the runner's global tsc 6.x (TS5107). A `npm install -g npm@…` step does
      # not change the npm the next step runs.
      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          registry-url: 'https://registry.npmjs.org'
      # `npm ci` reify intermittently aborts on this runner with "Exit handler never
      # called!" then exits 0, leaving an INCOMPLETE install (bins not linked). Gate
      # fallbacks on whether tsc linked, NOT exit code; lead with --ignore-scripts (skips
      # the playwright/native postinstall that triggers the crash). Build is `tsc` only, and
      # publish-time `prepack` is unaffected by install-time --ignore-scripts.
      # See ci.yml: runner reify aborts ("Exit handler never called!") then exits 0, leaving
      # bins unlinked. Serialize with --maxsockets 1, gate on tsc-linked, lead with
      # --ignore-scripts (build is tsc-only; publish-time prepack is unaffected).
      - name: Install deps (serialized, result-checked, self-healing)
        run: |
          node -v && npm -v
          linked() { test -x node_modules/.bin/tsc; }
          clean() { rm -rf node_modules packages/*/node_modules 2>/dev/null || true; }
          echo "::group::attempt 1 — npm ci --ignore-scripts --maxsockets 1"; npm ci --no-audit --no-fund --ignore-scripts --maxsockets 1 || true; echo "::endgroup::"
          if ! linked; then echo "::group::attempt 2 — npm install --ignore-scripts --maxsockets 1"; clean; npm install --no-audit --no-fund --no-save --ignore-scripts --maxsockets 1 || true; echo "::endgroup::"; fi
          if ! linked; then
            echo "::group::npm debug log"; tail -n 60 /home/runner/.npm/_logs/*-debug-0.log 2>/dev/null || echo "(no debug log)"; echo "::endgroup::"
            echo "::error::tsc not linked after install"; exit 1
          fi
          echo "[ok] local tsc $(node_modules/.bin/tsc --version)"
      # Ordered two-pass build (scripts/build.sh) — breaks the core<->executors cycle.
      - run: npm run build
      - name: Publish types -> core -> executors -> server -> cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          for pkg in types core executors server cli; do
            dir="packages/$pkg"
            if [ ! -d "$dir" ]; then
              echo "::notice::skip $pkg (not in this release)"
              continue
            fi
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "::notice::$name@$version already on the registry — skipping"
              continue
            fi
            if [ "${DRY_RUN:-false}" = "true" ]; then
              echo "::notice::[dry-run] would publish $name@$version"
              ( cd "$dir" && npm publish --access public --dry-run )
            else
              echo "::notice::publishing $name@$version"
              ( cd "$dir" && npm publish --access public )
            fi
          done
          echo "Done."
