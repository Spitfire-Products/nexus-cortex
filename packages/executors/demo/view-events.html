<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandbox Events - Live View</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #58a6ff;
    }
    .subtitle {
      color: #8b949e;
      margin-bottom: 30px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
    }
    .stat-label {
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 600;
      color: #58a6ff;
    }
    .events-container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
    }
    .events-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #30363d;
    }
    .event-item {
      padding: 12px;
      margin-bottom: 8px;
      background: #0d1117;
      border-left: 3px solid #58a6ff;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
    }
    .event-item.new {
      animation: slideIn 0.3s;
      border-left-color: #3fb950;
    }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .event-time {
      color: #8b949e;
      margin-right: 10px;
    }
    .event-type {
      color: #d29922;
      margin-right: 10px;
      font-weight: 600;
    }
    .event-data {
      color: #c9d1d9;
      margin-left: 20px;
      display: block;
      margin-top: 5px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3fb950;
      display: inline-block;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 Sandbox Events - Live View</h1>
    <p class="subtitle">
      <span class="status-dot"></span>
      Connected to http://localhost:4001
    </p>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Events</div>
        <div class="stat-value" id="total-events">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Live Events</div>
        <div class="stat-value" id="live-events">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sandbox ID</div>
        <div class="stat-value" style="font-size: 16px;">demo-sandbox-123</div>
      </div>
    </div>

    <div class="events-container">
      <div class="events-header">
        <h2>📜 Event Stream</h2>
        <button onclick="clearEvents()" style="background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 16px; border-radius: 6px; cursor: pointer;">Clear</button>
      </div>
      <div id="events-list"></div>
    </div>
  </div>

  <script>
    const sandboxId = 'demo-sandbox-123';
    const eventsList = document.getElementById('events-list');
    let totalEventsCount = 0;
    let liveEventsCount = 0;

    // Connect to WebSocket
    const socket = io('http://localhost:4001');

    socket.on('connect', () => {
      console.log('Connected to server');
      socket.emit('subscribe', sandboxId);
      addSystemMessage('Connected to WebSocket server');
    });

    socket.on('history', (data) => {
      console.log('Received history:', data.events.length, 'events');
      addSystemMessage(`Loaded ${data.events.length} historical events`);
      totalEventsCount = data.events.length;
      document.getElementById('total-events').textContent = totalEventsCount;

      // Show last 20 events
      data.events.slice(-20).forEach(event => {
        addEvent(event, false);
      });
    });

    // Listen for all event types
    const eventTypes = [
      'sandbox-created', 'sandbox-started', 'sandbox-stopped',
      'file-changed', 'console-log', 'console-error', 'console-warn',
      'network-request', 'network-response', 'screenshot-captured',
      'interaction-executed', 'hot-reload-triggered', 'process-restarted',
      'error-occurred'
    ];

    eventTypes.forEach(type => {
      socket.on(type, (event) => {
        totalEventsCount++;
        liveEventsCount++;
        document.getElementById('total-events').textContent = totalEventsCount;
        document.getElementById('live-events').textContent = liveEventsCount;
        addEvent(event, true);
      });
    });

    function addEvent(event, isNew) {
      const eventItem = document.createElement('div');
      eventItem.className = 'event-item' + (isNew ? ' new' : '');

      const time = new Date(event.timestamp).toLocaleTimeString();
      const dataStr = JSON.stringify(event.data, null, 2);

      eventItem.innerHTML = `
        <span class="event-time">[${time}]</span>
        <span class="event-type">${event.type}</span>
        <span class="event-data">${dataStr}</span>
      `;

      eventsList.insertBefore(eventItem, eventsList.firstChild);

      // Keep only last 50 events
      if (eventsList.children.length > 50) {
        eventsList.removeChild(eventsList.lastChild);
      }
    }

    function addSystemMessage(message) {
      const eventItem = document.createElement('div');
      eventItem.className = 'event-item';
      eventItem.style.borderLeftColor = '#3fb950';
      eventItem.innerHTML = `
        <span class="event-time">[${new Date().toLocaleTimeString()}]</span>
        <span class="event-type">SYSTEM</span>
        <span class="event-data">${message}</span>
      `;
      eventsList.insertBefore(eventItem, eventsList.firstChild);
    }

    function clearEvents() {
      eventsList.innerHTML = '';
      liveEventsCount = 0;
      document.getElementById('live-events').textContent = 0;
    }

    socket.on('disconnect', () => {
      addSystemMessage('Disconnected from server');
    });
  </script>
</body>
</html>
